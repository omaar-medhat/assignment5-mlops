name: Multi-Job ML Pipeline

on:
  workflow_dispatch:
    inputs:
      force_fail:
        description: "Force model training to fail (low accuracy for testing)"
        required: true
        default: "false"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  validate:
    name: Validation Job
    runs-on: ubuntu-latest

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: DVC step
        run: |
          echo "Simulating DVC pull"
          dvc version

      - name: Train model
        env:
          FORCE_FAIL: ${{ github.event.inputs.force_fail }}
        run: python train.py

      - name: Verify generated files
        run: |
          echo "=== model_info.txt ==="
          cat model_info.txt
          echo "=== current directory ==="
          ls
          echo "=== mlruns exists? ==="
          if [ -d mlruns ]; then
            echo "mlruns found"
          else
            echo "mlruns not found"
            exit 1
          fi

      - name: Upload pipeline state artifact
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-state
          path: |
            model_info.txt
            mlruns

  deploy:
    name: Deployment Job
    runs-on: ubuntu-latest
    needs: validate

    env:
      MLFLOW_TRACKING_URI: file:./mlruns

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download pipeline state artifact
        uses: actions/download-artifact@v4
        with:
          name: pipeline-state
          path: .

      - name: Verify downloaded files
        run: |
          echo "=== model_info.txt ==="
          cat model_info.txt
          echo "=== current directory ==="
          ls
          echo "=== mlruns exists? ==="
          if [ -d mlruns ]; then
            echo "mlruns found"
          else
            echo "mlruns not found"
            exit 1
          fi

      - name: Check accuracy threshold
        run: python check_threshold.py

      - name: Mock Docker build
        if: success()
        run: |
          echo "Building Docker image for Run ID: $(cat model_info.txt)"
          docker build --build-arg RUN_ID=$(cat model_info.txt) -t mock-model:latest .

      - name: Deployment complete
        if: success()
        run: echo "Deployment completed successfully"